services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: costwatch-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-costwatch}
      POSTGRES_USER: ${POSTGRES_USER:-costwatch_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-costwatch_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas/01_core.sql:/docker-entrypoint-initdb.d/01_core.sql
      - ./database/schemas/02_costs.sql:/docker-entrypoint-initdb.d/02_costs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-costwatch_user} -d ${POSTGRES_DB:-costwatch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - costwatch-network

  # API Gateway — auth and routing
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: costwatch-api-gateway
    ports:
      - "8002:8002"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-costwatch}
      - POSTGRES_USER=${POSTGRES_USER:-costwatch_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-costwatch_password}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - RESOURCE_SCANNER_URL=http://resource-scanner:8000
      - COST_SERVICE_URL=http://cost-service:8001
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - costwatch-network

  # Cost Service — AWS cost data and trends
  cost-service:
    build:
      context: ./services/cost-service
      dockerfile: Dockerfile
    container_name: costwatch-cost-service
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-costwatch}
      - POSTGRES_USER=${POSTGRES_USER:-costwatch_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-costwatch_password}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - costwatch-network

  # Resource Scanner — AWS resource discovery
  resource-scanner:
    build:
      context: ./services/resource-scanner
      dockerfile: Dockerfile
    container_name: costwatch-resource-scanner
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-costwatch}
      - POSTGRES_USER=${POSTGRES_USER:-costwatch_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-costwatch_password}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - costwatch-network

  # Frontend — minimal React dashboard
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: costwatch-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8002
    depends_on:
      - api-gateway
    networks:
      - costwatch-network

volumes:
  postgres_data:

networks:
  costwatch-network:
    driver: bridge
