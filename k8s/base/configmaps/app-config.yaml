apiVersion: v1
kind: ConfigMap
metadata:
  name: costwatch-config
  namespace: costwatch
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"

  # Database
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "costwatch"
  POSTGRES_USER: "costwatch_user"

  # Service URLs
  RESOURCE_SCANNER_URL: "http://resource-scanner:8000"
  COST_SERVICE_URL: "http://cost-service:8001"

  # AWS
  AWS_REGION: "us-west-2"

  # Security
  JWT_ALGORITHM: "HS256"
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
