apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-policy
  namespace: costwatch
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8002
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow to cost-service
  - to:
    - podSelector:
        matchLabels:
          app: cost-service
    ports:
    - protocol: TCP
      port: 8001
  # Allow to resource-scanner
  - to:
    - podSelector:
        matchLabels:
          app: resource-scanner
    ports:
    - protocol: TCP
      port: 8000
  # Allow to database
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow to AWS APIs
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
