# Prometheus Configuration for CostWatch
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # API Gateway metrics
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8002']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Cost Service metrics
  - job_name: 'cost-service'
    static_configs:
      - targets: ['cost-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Resource Scanner metrics
  - job_name: 'resource-scanner'
    static_configs:
      - targets: ['resource-scanner:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
